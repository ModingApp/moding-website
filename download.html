<!doctype html>
<html lang="ko">
<head>
  <!-- =========================================================
       기본 메타 정보
       ========================================================= -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>모딩 앱 다운로드</title>

  <meta name="description" content="모딩(Moding) 앱 다운로드 페이지입니다. 사용 중인 기기에 맞는 스토어로 이동합니다.">
  <meta name="robots" content="noindex, nofollow">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Moding">
  <meta property="og:title" content="모딩 앱 다운로드">
  <meta property="og:description" content="사용 중인 기기에 맞는 스토어에서 모딩 앱을 설치해 주세요.">
  <meta property="og:url" content="https://moding.app/download.html">
  <meta property="og:image" content="https://moding.app/모딩로고.png">

  <!-- =========================================================
       기기별 자동 분기
       ========================================================= -->
  <script>
    const androidUrl = "https://play.google.com/store/apps/details?id=com.moding.application";
    const iosUrl = "https://apps.apple.com/kr/app/%EB%AA%A8%EB%94%A9-%EC%9A%B0%EB%A6%AC%EC%8B%9D%EB%8B%B9%EC%97%90-%ED%95%84%EC%9A%94%ED%95%9C-%ED%8A%B9%EC%88%98%EC%8B%9D%EC%9E%90%EC%9E%AC/id6772018982";

    const ua = navigator.userAgent || navigator.vendor || window.opera;

    const isAndroid = /android/i.test(ua);
    const isIOS =
      /iPhone|iPad|iPod/i.test(ua) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    if (isAndroid) {
      window.location.replace(androidUrl);
    } else if (isIOS) {
      window.location.replace(iosUrl);
    }
  </script>

  <style>
    /* =========================================================
       1. 브랜드 컬러 / 기본 변수
       ========================================================= */
    :root {
      --moding-green: #238B22;
      --moding-green-dark: #1c6f1c;
      --moding-orange: #FF8C00;
      --bg-light: #F7F9F8;
      --bg-white: #ffffff;
      --text-main: #1F3B1F;
      --text-sub: #666666;
      --border-light: #e1e4e2;
      --shadow-card: 0 14px 36px rgba(0, 0, 0, 0.12);
    }

    /* =========================================================
       2. Reset
       ========================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 140, 0, 0.18), transparent 28%),
        radial-gradient(circle at 88% 78%, rgba(35, 139, 34, 0.18), transparent 30%),
        linear-gradient(135deg, #F7F9F8 0%, #EEF6EF 100%);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      word-break: keep-all;
    }

    a {
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* =========================================================
       3. Download Card
       ========================================================= */
    .download-wrap {
      width: 100%;
      max-width: 440px;
    }

    .download-card {
      width: 100%;
      padding: 34px 26px 30px;
      border-radius: 30px;
      background: var(--bg-white);
      border: 1px solid rgba(35, 139, 34, 0.12);
      box-shadow: var(--shadow-card);
      text-align: center;
    }

    .logo {
      width: 142px;
      margin: 0 auto 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(35, 139, 34, 0.25);
      color: var(--moding-green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 30px;
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: -0.045em;
      color: var(--moding-green);
    }

    h1 .orange {
      color: var(--moding-orange);
    }

    .desc {
      margin-bottom: 26px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-sub);
    }

    .store-buttons {
      display: grid;
      gap: 12px;
    }

    .store-btn {
      min-height: 58px;
      border-radius: 18px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.2s ease,
        background 0.2s ease,
        color 0.2s ease,
        border-color 0.2s ease;
    }

    .store-btn:hover {
      transform: translateY(-2px);
    }

    .store-btn.ios {
      background: #111111;
      color: #ffffff;
      border: 2px solid #111111;
    }

    .store-btn.android {
      background: var(--moding-green);
      color: #ffffff;
      border: 2px solid var(--moding-green);
    }

    .store-btn.android:hover {
      background: var(--moding-green-dark);
      border-color: var(--moding-green-dark);
    }

    .note {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.65;
      color: #888888;
    }

    /* =========================================================
       4. Responsive
       ========================================================= */
    @media (max-width: 420px) {
      body {
        padding: 20px;
      }

      .download-card {
        padding: 30px 22px 26px;
        border-radius: 26px;
      }

      .logo {
        width: 132px;
      }

      h1 {
        font-size: 27px;
      }

      .desc {
        font-size: 14px;
      }

      .store-btn {
        min-height: 56px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="download-wrap">
    <section class="download-card" aria-label="모딩 앱 다운로드">

      <img src="모딩로고.png" alt="Moding Logo" class="logo">

      <div class="eyebrow">MODING APP</div>

      <h1>
        모딩 앱<br>
        <span class="orange">다운로드</span>
      </h1>

      <p class="desc">
        사용 중인 기기에 맞는 스토어로 자동 이동합니다.<br>
        자동 이동이 되지 않으면 아래 버튼을 선택해 주세요.
      </p>

      <div class="store-buttons">
        <a
          href="https://apps.apple.com/kr/app/%EB%AA%A8%EB%94%A9-%EC%9A%B0%EB%A6%AC%EC%8B%9D%EB%8B%B9%EC%97%90-%ED%95%84%EC%9A%94%ED%95%9C-%ED%8A%B9%EC%88%98%EC%8B%9D%EC%9E%90%EC%9E%AC/id6772018982"
          class="store-btn ios"
        >
          iPhone 앱 다운로드
        </a>

        <a
          href="https://play.google.com/store/apps/details?id=com.moding.application"
          class="store-btn android"
        >
          Android 앱 다운로드
        </a>
      </div>

      <p class="note">
        PC에서 접속한 경우 사용하는 휴대폰에 맞는 스토어를 선택해 주세요.
      </p>

    </section>
  </main>
</body>
</html>
