<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모딩 판매자 입점 제안서</title>

  <style>
    :root {
      --moding-green: #238B22;
      --moding-orange: #FF8C00;
      --bg-light: #F7F9F8;
      --text-main: #1F3B1F;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      background: var(--bg-light);
      color: var(--text-main);
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      width: 130px;
      height: auto;
    }

    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    a.btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--moding-green);
      color: var(--moding-green);
      background: #fff;
    }

    a.btn.main {
      background: var(--moding-green);
      color: #fff;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--moding-green);
    }

    p {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 18px;
      color: #444;
    }

    .pdf-box {
      width: 100%;
      height: 78vh;
      background: #fff;
      border: 1px solid #d8dedb;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .pdf-box iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .mobile-note {
      margin-top: 12px;
      font-size: 12px;
      color: #777;
    }

    @media (max-width: 600px) {
      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      .btns {
        justify-content: flex-start;
      }

      h1 {
        font-size: 21px;
      }

      .pdf-box {
        height: 72vh;
        border-radius: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <img src="모딩로고.png" alt="Moding Logo" class="logo" />

      <div class="btns">
        <a href="alliance.html" class="btn">입점 안내로</a>
        <a href="seller-application/Moding_Inc_Seller.pdf" class="btn main" target="_blank" rel="noopener">
          PDF 새창 열기
        </a>
        <a href="seller-application/Moding_Inc_Seller.pdf" class="btn" download>
          다운로드
        </a>
      </div>
    </div>

    <h1>모딩 판매자 입점 제안서</h1>
    <p>
      아래 화면에서 판매자 입점 제안서를 확인하실 수 있습니다.
      모바일 환경에서 PDF가 바로 보이지 않을 경우, 상단의 ‘PDF 새창 열기’ 또는 ‘다운로드’ 버튼을 이용해 주세요.
    </p>

    <div class="pdf-box">
      <iframe src="seller-application/Moding_Inc_Seller.pdf"></iframe>
    </div>

    <div class="mobile-note">
      ※ 일부 모바일 문자 앱이나 브라우저에서는 PDF가 자동 다운로드될 수 있습니다.
    </div>
  </div>
</body>
</html>
