<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- =========================================================
       기본 메타 정보
       ========================================================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>모딩(Moding) | 사장님! 오늘부터 모딩하세요</title>

  <meta name="description" content="모딩(Moding)은 외식업 사장님이 메뉴에 맞는 식품·식자재 상품을 쉽게 찾을 수 있도록 돕는 B2B 식품 거래 앱입니다.">

  <!-- SNS 공유 / 카카오톡 미리보기용 -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Moding">
  <meta property="og:title" content="모딩(Moding) | 사장님! 오늘부터 모딩하세요">
  <meta property="og:description" content="메뉴에 맞는 상품을 모딩 앱에서 확인하세요.">
  <meta property="og:url" content="https://moding.app/">
  <meta property="og:image" content="https://moding.app/모딩로고.png">

  <style>
    /* =========================================================
       1. 브랜드 컬러 / 공통 변수
       ========================================================= */
    :root {
      --moding-green: #238B22;
      --moding-green-dark: #1c6f1c;
      --moding-orange: #FF8C00;
      --moding-orange-dark: #e67800;

      --bg-light: #F7F9F8;
      --bg-white: #ffffff;

      --text-main: #1F3B1F;
      --text-sub: #666666;

      --border-light: #e1e4e2;
      --shadow-soft: 0 16px 42px rgba(0, 0, 0, 0.08);
      --shadow-card: 0 14px 34px rgba(0, 0, 0, 0.10);
    }

    /* =========================================================
       2. Reset / 기본 설정
       ========================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg-light);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    a {
      color: inherit;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* =========================================================
       3. Header / Navigation
       ========================================================= */
    header {
      width: 100%;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-light);
    }

    .nav {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo img {
      width: 136px;
      height: auto;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 22px;
      font-size: 15px;
      font-weight: 700;
    }

    .nav-menu a {
      text-decoration: none;
      color: var(--moding-green);
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .nav-menu a:hover {
      color: var(--moding-orange);
    }

    /* =========================================================
       4. Main / Hero
       ========================================================= */
    main {
      flex: 1;
      width: 100%;
    }

    .hero {
      width: 100%;
      text-align: center;
      padding: 70px 0 68px;
    }

    .hero-title {
      font-size: clamp(30px, 4.2vw, 48px);
      font-weight: 850;
      line-height: 1.28;
      letter-spacing: -0.045em;
      color: var(--moding-green);
      margin-bottom: 0;
    }

    .hero-title .orange {
      color: var(--moding-orange);
    }

    /* =========================================================
       5. 메인 비주얼 이미지 3장 영역
       - iOS_1.png / iOS_2.png / iOS_3.png 파일을 index.html과 같은 위치에 업로드
       - 3장이 동시에 노출됨
       - 최초 진입 시에만 순서대로 부드럽게 등장
       ========================================================= */
    .hero-visual-section {
      width: 100%;
      margin: 44px auto 34px;
    }

    .hero-visual-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .hero-visual-card {
      width: 100%;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      opacity: 0;
      transform: translateY(26px) scale(0.98);
      animation: visualFadeUp 0.8s ease forwards;
    }

    .hero-visual-card:nth-child(1) {
      animation-delay: 0.08s;
    }

    .hero-visual-card:nth-child(2) {
      animation-delay: 0.22s;
    }

    .hero-visual-card:nth-child(3) {
      animation-delay: 0.36s;
    }

    .hero-visual-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 데스크탑에서만 살짝 떠오르는 느낌 */
    @media (hover: hover) and (pointer: fine) {
      .hero-visual-card {
        transition: transform 0.22s ease, box-shadow 0.22s ease;
      }

      .hero-visual-card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: var(--shadow-soft);
      }
    }

    /* =========================================================
       6. 다운로드 버튼
       ========================================================= */
    .download-wrapper {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .download-btn {
      width: 220px;
      min-height: 60px;
      padding: 13px 20px;
      border-radius: 18px;
      background: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.25;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition:
        background 0.2s ease,
        color 0.2s ease,
        border-color 0.2s ease,
        transform 0.2s ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
    }

    .download-btn.google {
      border: 2px solid var(--moding-green);
      color: var(--moding-green);
    }

    .download-btn.google:hover {
      background: var(--moding-green);
      border-color: var(--moding-green);
      color: #ffffff;
    }

    .download-btn.apple {
      border: 2px solid var(--moding-orange);
      color: var(--moding-orange);
    }

    .download-btn.apple:hover {
      background: var(--moding-orange);
      border-color: var(--moding-orange);
      color: #ffffff;
    }

    /* iOS 준비중 상태 */
    .download-btn.disabled {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
      transform: none;
    }

    .download-note {
      margin-top: 14px;
      font-size: 13px;
      color: #777777;
      line-height: 1.6;
    }

    /* =========================================================
       7. Footer
       ========================================================= */
    footer {
      width: 100%;
      margin-top: auto;
      padding: 24px 10px;
      background: var(--bg-white);
      border-top: 1px solid var(--border-light);
      text-align: center;
      font-size: 12px;
      line-height: 1.8;
      color: #777777;
    }

    .footer-links {
      margin-bottom: 5px;
      font-size: 12px;
      text-align: center;
    }

    .footer-links a {
      text-decoration: none;
      color: var(--moding-green);
      font-weight: 700;
    }

    .footer-links a:hover {
      color: var(--moding-orange);
    }

    .footer-links .divider {
      margin: 0 6px;
      color: #bbbbbb;
    }

    /* =========================================================
       8. 복사 / 드래그 방지
       기존 홈페이지 정책 유지
       ========================================================= */
    html,
    body,
    *:not(input):not(textarea) {
      -webkit-user-select: none;
      user-select: none;
    }

    img {
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: none;
    }

    input,
    textarea {
      user-select: text;
      pointer-events: auto;
    }

    /* =========================================================
       9. Animation
       ========================================================= */
    @keyframes visualFadeUp {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* 사용자가 애니메이션 줄이기를 설정한 경우 */
    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .hero-visual-card {
        opacity: 1;
        transform: none;
        animation: none;
      }

      .download-btn,
      .nav-menu a {
        transition: none;
      }
    }

    /* =========================================================
       10. Responsive / 노트북 · 태블릿 · 폴드 펼침
       ========================================================= */
    @media (max-width: 1024px) {
      .container {
        max-width: 960px;
      }

      .hero {
        padding: 62px 0 58px;
      }

      .hero-visual-grid {
        gap: 14px;
      }

      .hero-visual-card {
        border-radius: 24px;
      }
    }

    /* =========================================================
       11. Responsive / 태블릿 세로 · 폴드 펼침 좁은 화면
       - 3장 모두 한 화면에 보이도록 유지
       ========================================================= */
    @media (max-width: 820px) {
      .nav {
        padding: 14px 20px;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
      }

      .nav-logo img {
        width: 124px;
      }

      .nav-menu {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        font-size: 14px;
      }

      .container {
        padding: 0 20px;
      }

      .hero {
        padding: 50px 0 50px;
      }

      .hero-title {
        font-size: clamp(29px, 6.2vw, 40px);
      }

      .hero-visual-section {
        margin-top: 36px;
      }

      .hero-visual-grid {
        gap: 12px;
      }

      .hero-visual-card {
        border-radius: 20px;
      }
    }

    /* =========================================================
       12. Responsive / 일반 스마트폰 · 아이폰
       - 세로 포스터 3장을 억지로 축소하지 않고 가로 스크롤 카드로 노출
       - 한 장씩 자동 전환은 아니며, 3장이 모두 존재함
       ========================================================= */
    @media (max-width: 640px) {
      .nav-logo img {
        width: 116px;
      }

      .nav-menu {
        gap: 14px;
        font-size: 13px;
      }

      .hero {
        padding: 42px 0 44px;
      }

      .hero-title {
        font-size: clamp(26px, 8vw, 34px);
        line-height: 1.34;
      }

      .hero-visual-section {
        margin: 32px calc(50% - 50vw) 26px;
        overflow: hidden;
      }

      .hero-visual-grid {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        padding: 6px 20px 20px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

      .hero-visual-grid::-webkit-scrollbar {
        display: none;
      }

      .hero-visual-card {
        flex: 0 0 78%;
        max-width: 380px;
        border-radius: 22px;
        scroll-snap-align: center;
      }

      .download-wrapper {
        margin-top: 28px;
        gap: 12px;
      }

      .download-btn {
        width: 100%;
        max-width: 300px;
        min-height: 58px;
      }

      .download-note {
        max-width: 300px;
        margin-left: auto;
        margin-right: auto;
        word-break: keep-all;
      }
    }

    /* =========================================================
       13. Responsive / 아이폰 SE · 갤럭시 폴드 접은 화면 등 매우 좁은 화면
       ========================================================= */
    @media (max-width: 380px) {
      .nav {
        padding-left: 14px;
        padding-right: 14px;
      }

      .nav-logo img {
        width: 108px;
      }

      .nav-menu {
        gap: 11px;
        font-size: 12px;
      }

      .container {
        padding: 0 16px;
      }

      .hero {
        padding: 36px 0 40px;
      }

      .hero-title {
        font-size: 24px;
        letter-spacing: -0.04em;
      }

      .hero-visual-card {
        flex-basis: 84%;
      }

      .download-btn {
        max-width: 280px;
        min-height: 56px;
        font-size: 14px;
      }

      footer {
        padding: 22px 14px;
      }
    }

    /* =========================================================
       14. Responsive / 가로모드 스마트폰
       - 세로 공간이 부족한 가로모드에서 상하 여백 축소
       ========================================================= */
    @media (max-height: 520px) and (orientation: landscape) {
      .hero {
        padding: 34px 0 36px;
      }

      .hero-visual-section {
        margin-top: 28px;
      }

      .download-wrapper {
        margin-top: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- =======================================================

      <nav class="nav" aria-label="주요 메뉴">

    <!-- =======================================================

    <main>

          <h1 class="hero-title">
            사장님!<br>
            <span class="orange">오늘부터 모딩하세요 :)</span>
          </h1>

          <!--
            메인 비주얼 3장

            index.html과 같은 위치에 iOS_1.png, iOS_2.png, iOS_3.png 업로드

          <div class="hero-visual-section" aria-label="모딩 서비스 소개 이미지">
            <div class="hero-visual-grid">

              <div class="hero-visual-card">
                <img
                  src="iOS_1.png"

              <div class="hero-visual-card">
                <img
                  src="iOS_2.png"
                  alt="메뉴 경쟁력은 상품 선택에서 시작됩니다"
                  loading="eager"
                  decoding="async"
                >
              </div>

              <div class="hero-visual-card">
                <img
                  src="iOS_3.png"
                  alt="흔하지 않은 상품이 흔하지 않은 매장을 만듭니다"
                  loading="eager"
                  decoding="async"
                >
              </div>

            </div>
          </div>

          <!-- 다운로드 버튼 -->
          <div class="download-wrapper" aria-label="앱 다운로드">

            <!-- Android 다운로드 링크 -->
            <a
              class="download-btn google"
              href="https://play.google.com/store/apps/details?id=com.moding.application"
              target="_blank"
              rel="noopener noreferrer"
            >
              Android<br>다운로드
            </a>

            <!--
              iOS 준비중 버튼
              App Store 링크가 나오면:
              1) class에서 disabled 삭제
              2) href="#"를 실제 App Store 링크로 교체
              3) 문구를 iOS 다운로드로 변경
            -->
            <a
              class="download-btn apple disabled"
              href="#"
              aria-disabled="true"
              tabindex="-1"
            >
              iOS<br>준비중
            </a>

          </div>

          <p class="download-note">
            iOS 버전은 App Store 등록 완료 후 다운로드가 가능합니다.
          </p>

        </div>
      </section>
    </main>

    <!-- =======================================================
         FOOTER
         ======================================================= -->
    <footer>
      <div class="footer-links">
        <a href="terms.html">이용약관</a>
        <span class="divider">·</span>
        <a href="privacy.html">개인정보처리방침</a>
        <span class="divider">·</span>
        <a href="location.html">오시는 길</a>
      </div>

      통신판매업신고: 제2025-대구달서-1367호 · partner@moding.app<br>
      대구광역시 달서구 달구벌대로 1870, 7층
    </footer>

  </div>

  <script>
    /* =========================================================
       복사 / 드래그 방지
       ========================================================= */
    document.addEventListener("contextmenu", function (e) {
      if (!e.target.closest("input, textarea, a")) {
        e.preventDefault();
      }
    });

    document.addEventListener("dragstart", function (e) {
      if (!e.target.closest("input, textarea")) {
        e.preventDefault();
      }
    });

    document.addEventListener("keydown", function (e) {
      const key = e.key.toLowerCase();

      if ((e.ctrlKey || e.metaKey) && !e.target.closest("input, textarea")) {
        if (["c", "x", "v", "s", "u", "p", "a"].includes(key)) {
          e.preventDefault();
        }
      }
    });

    document.addEventListener("copy", function (e) {
      if (!e.target.closest("input, textarea")) {
        e.preventDefault();
      }
    });
  </script>
