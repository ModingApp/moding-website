  <style>
    /* =========================================================
       1. 브랜드 컬러 / 공통 변수
       ========================================================= */
    :root {
      --moding-green: #238B22;
      --moding-green-dark: #1c6f1c;
      --moding-orange: #FF8C00;
      --moding-orange-dark: #e67800;

      --bg-light: #F7F9F8;
      --bg-white: #ffffff;

      --text-main: #1F3B1F;
      --text-sub: #555555;

      --border-light: #e1e4e2;
      --shadow-soft: 0 14px 36px rgba(0, 0, 0, 0.08);
    }

    /* =========================================================
       2. Reset / 기본 설정
       ========================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg-light);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    a {
      color: inherit;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* =========================================================
       3. Header / Navigation
       ========================================================= */
    header {
      width: 100%;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-light);
    }

    .nav {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo img {
      width: 160px;
      height: auto;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 22px;
      font-size: 15px;
      font-weight: 600;
    }

    .nav-menu a {
      text-decoration: none;
      color: var(--moding-green);
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .nav-menu a:hover {
      color: var(--moding-orange);
    }

    /* =========================================================
       4. Main / Hero
       ========================================================= */
    main {
      flex: 1;
      width: 100%;
    }

    .hero {
      width: 100%;
      text-align: center;
      padding: 72px 0 68px;
    }

    .hero-title {
      font-size: 38px;
      font-weight: 800;
      line-height: 1.32;
      letter-spacing: -0.04em;
      color: var(--moding-green);
      margin-bottom: 20px;
    }

    .hero-line {
      display: inline-block;
      min-height: 1.35em;
    }

    .hero-line2 {
      color: var(--moding-orange);
    }

    .hero-sub {
      margin-top: 28px;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--text-main);
    }

    /* =========================================================
       5. 메인 비주얼 이미지 3장 영역
       - iOS1.png / iOS2.png / iOS3.png 파일을 index.html과 같은 위치에 업로드
       - 한 장씩 사라지는 슬라이드가 아니라 3장이 동시에 노출됨
       - 최초 진입 시에만 순서대로 부드럽게 등장
       ========================================================= */
    .hero-visual-section {
      width: 100%;
      margin: 42px auto 34px;
    }

    .hero-visual-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      align-items: center;
    }

    .hero-visual-card {
      width: 100%;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      opacity: 0;
      transform: translateY(26px) scale(0.98);
      animation: visualFadeUp 0.8s ease forwards;
    }

    .hero-visual-card:nth-child(1) {
      animation-delay: 0.08s;
    }

    .hero-visual-card:nth-child(2) {
      animation-delay: 0.24s;
    }

    .hero-visual-card:nth-child(3) {
      animation-delay: 0.40s;
    }

    .hero-visual-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* =========================================================
       6. 다운로드 버튼
       ========================================================= */
    .download-wrapper {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .download-btn {
      width: 220px;
      min-height: 58px;
      padding: 13px 20px;
      border-radius: 18px;
      background: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition:
        background 0.2s ease,
        color 0.2s ease,
        border-color 0.2s ease,
        transform 0.2s ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
    }

    .download-btn.google {
      border: 2px solid var(--moding-green);
      color: var(--moding-green);
    }

    .download-btn.google:hover {
      background: var(--moding-green);
      border-color: var(--moding-green);
      color: #ffffff;
    }

    .download-btn.apple {
      border: 2px solid var(--moding-orange);
      color: var(--moding-orange);
    }

    .download-btn.apple:hover {
      background: var(--moding-orange);
      border-color: var(--moding-orange);
      color: #ffffff;
    }

    /* iOS 준비중 상태 */
    .download-btn.disabled {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
      transform: none;
    }

    .download-note {
      margin-top: 14px;
      font-size: 13px;
      color: #777777;
      line-height: 1.6;
    }

    /* =========================================================
       7. Footer
       ========================================================= */

      margin-top: auto;
      padding: 24px 10px;

      border-top: 1px solid var(--border-light);
      text-align: center;

      line-height: 1.8;
      color: #777777;
    }

      font-size: 12px;
      text-align: center;
    }

      text-decoration: none;
      color: var(--moding-green);
      font-weight: 600;
    }

    .footer-links a:hover {
      color: var(--moding-orange);
    }

    .footer-links .divider {

      color: #bbbbbb;
    }

    /* =========================================================
       8. 복사 / 드래그 방지
       기존 홈페이지 정책 유지
       ========================================================= */
    html,
    body,
    *:not(input):not(textarea) {
      -webkit-user-select: none;
      user-select: none;
    }

    img {
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: none;
    }

    input,
    textarea {
      user-select: text;
      pointer-events: auto;
    }

    /* =========================================================
       9. Animation
       ========================================================= */
    @keyframes visualFadeUp {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* =========================================================
       10. Responsive / 태블릿
       ========================================================= */
    @media (max-width: 900px) {
      .hero {
        padding: 58px 0 56px;
      }

      .hero-title {
        font-size: 34px;
      }

      .hero-visual-grid {
        gap: 14px;
      }

      .hero-visual-card {
        border-radius: 22px;
      }
    }

    /* =========================================================
       11. Responsive / 모바일
       - 모바일에서는 3장을 작게 우겨넣지 않고 가로 스크롤 카드형으로 노출

      }

      }

      .nav-menu {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        font-size: 14px;
      }

      .container {

      }

      .hero {

      }

      }

      .hero-sub {

      }

      }

      .hero-visual-grid {
        display: flex;

        -webkit-overflow-scrolling: touch;
      }

      .hero-visual-grid::-webkit-scrollbar {
        display: none;
      }

      .hero-visual-card {
        flex: 0 0 74%;
        max-width: 380px;
        border-radius: 22px;
        scroll-snap-align: center;
      }

      .download-wrapper {
        margin-top: 26px;
        gap: 12px;
      }

      .download-btn {
        width: 100%;
        max-width: 280px;
        min-height: 56px;
      }
    }

    /* =========================================================
       12. Responsive / 작은 모바일

      }

        flex-basis: 82%;
      }

      footer {

      }
    }
  </style>
</head>

  <script>
    /* =========================================================
       복사 / 드래그 방지
       ========================================================= */
    document.addEventListener("contextmenu", function (e) {
      if (!e.target.closest("input, textarea, a")) {
        e.preventDefault();
      }
    });

    document.addEventListener("dragstart", function (e) {
      if (!e.target.closest("input, textarea")) {
        e.preventDefault();
      }
    });

    document.addEventListener("keydown", function (e) {
      const key = e.key.toLowerCase();

      if ((e.ctrlKey || e.metaKey) && !e.target.closest("input, textarea")) {
        if (["c", "x", "v", "s", "u", "p", "a"].includes(key)) {
          e.preventDefault();
        }
      }
    });

    document.addEventListener("copy", function (e) {
      if (!e.target.closest("input, textarea")) {
        e.preventDefault();
      }
    });

    /* =========================================================
       히어로 타이핑 효과
       - HTML에는 기본 문구를 넣어두고,
         JS가 실행되면 한 번 지운 뒤 다시 타이핑합니다.
       - JS가 꺼져 있어도 문구는 그대로 보입니다.
       ========================================================= */
    document.addEventListener("DOMContentLoaded", function () {
      const line1El = document.querySelector(".hero-line1");
      const line2El = document.querySelector(".hero-line2");

      if (!line1El || !line2El) return;

      const line1Text = line1El.dataset.text || line1El.textContent;
      const line2Text = line2El.dataset.text || line2El.textContent;

      const speed = 90;
      const delayBetweenLines = 360;

      line1El.textContent = "";
      line2El.textContent = "";

      function typeLine(text, element, callback) {
        let index = 0;

        function step() {
          if (index <= text.length) {
            element.textContent = text.slice(0, index);
            index += 1;
            setTimeout(step, speed);
            return;
          }

          if (typeof callback === "function") {
            callback();
          }
        }

        step();
      }

      typeLine(line1Text, line1El, function () {
        setTimeout(function () {
          typeLine(line2Text, line2El);
        }, delayBetweenLines);
      });
    });
  </script>
